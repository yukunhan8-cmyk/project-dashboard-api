version: '3.8'

services:
  backend:
    build: ./backend
    container_name: dashboard-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - BITABLE_APP_TOKEN=${BITABLE_APP_TOKEN}
      - TABLE_GMV_OVERVIEW=${TABLE_GMV_OVERVIEW}
      - TABLE_CHANNEL_OVERVIEW=${TABLE_CHANNEL_OVERVIEW}
      - TABLE_FUNNEL=${TABLE_FUNNEL}
      - TABLE_LIVE_DATA=${TABLE_LIVE_DATA}
      - CACHE_TTL=30
      - CORS_ORIGIN=*
    networks:
      - dashboard-net

  frontend:
    build: ./frontend
    container_name: dashboard-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - dashboard-net

networks:
  dashboard-net:
    driver: bridge
